services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: loans-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  loans-api:
    build:
      context: ./loans-api
    container_name: loans-api
    environment:
      PORT: 5000
      DB_DRIVER: tedious
      DB_SERVER: sqlserver
      DB_PORT: 1433
      DB_NAME: LoanSystemDB
      DB_USER: sa
      DB_PASSWORD: YourStrong!Passw0rd
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERT: "true"
      DB_TRUSTED_CONNECTION: "false"
    ports:
      - "5000:5000"
    depends_on:
      - sqlserver

  loans-web:
    build:
      context: ./loans-web
      args:
        REACT_APP_API_URL: /api
    container_name: loans-web
    ports:
      - "3000:80"
    depends_on:
      - loans-api

volumes:
  sqlserver_data:
